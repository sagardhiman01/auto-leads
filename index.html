<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadsFlow Pro 3.0 | Hunter Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #10b981;
            --bg: #030712;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #0d0f1a 0%, #030712 100%);
            background-attachment: fixed;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.25rem 2rem;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo { 
            font-size: 1.6rem; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%); 
            -webkit-background-clip: text; 
            color: transparent; 
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 120px 180px;
            gap: 1rem;
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 28px;
            border: 1px solid var(--border);
            margin-bottom: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
        }

        .btn-hunt {
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-hunt:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px var(--primary-glow);
            filter: brightness(1.1);
        }
        .btn-hunt:active { transform: translateY(0); }

        .status-panel {
            background: #000;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            border: 1px solid var(--border);
            display: none;
            animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .status-header { display: flex; justify-content: space-between; margin-bottom: 1.25rem; font-size: 0.8rem; font-weight: 700; color: var(--text-dim); letter-spacing: 1px; }
        .log-display { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent); white-space: pre-wrap; height: 50px; overflow: hidden; opacity: 0.9; }

        .batch-card {
            background: var(--surface);
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .batch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .batch-info h3 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.5px; }
        .batch-info p { color: var(--text-dim); font-size: 0.9rem; font-weight: 500; }

        .btn-download {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.75rem 1.25rem;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: 0.2s;
        }
        .btn-download:hover { background: rgba(59, 130, 246, 0.2); border-color: var(--primary); }

        .lead-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; margin-top: -12px; }
        .lead-table th { text-align: left; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding: 0 1rem 0.5rem 1rem; letter-spacing: 1px; }
        .lead-table td { padding: 1.25rem 1rem; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .lead-table td:first-child { border-left: 1px solid var(--border); border-radius: 16px 0 0 16px; }
        .lead-table td:last-child { border-right: 1px solid var(--border); border-radius: 0 16px 16px 0; }

        .score-badge { padding: 0.4rem 0.8rem; border-radius: 12px; background: rgba(16, 185, 129, 0.1); color: var(--accent); font-weight: 700; font-size: 0.85rem; border: 1px solid rgba(16, 185, 129, 0.2); }
        
        .golden-lead td { background: rgba(251, 191, 36, 0.04) !important; border-color: rgba(251, 191, 36, 0.2) !important; }
        .golden-tag { font-size: 0.6rem; color: #fbbf24; text-transform: uppercase; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }

        .btn-audit { margin-top: 8px; display: inline-flex; font-size: 0.7rem; font-weight: 700; padding: 4px 10px; background: rgba(255,255,255,0.05); color: var(--text-main); text-decoration: none; border-radius: 6px; border: 1px solid var(--border); transition: 0.2s; }
        .btn-audit:hover { background: var(--primary); border-color: var(--primary); }

        .btn-logout { background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 0.6rem 1.2rem; font-size: 0.85rem; font-weight: 700; }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; box-shadow: none; transform: none; }

        /* --- RESPONSIVE DESIGN --- */

        /* Desktop (Large Screens) */
        @media (min-width: 1200px) {
            .container { max-width: 1200px; }
        }

        /* Tablet (768px to 1024px) */
        @media (max-width: 1024px) {
            .search-grid { 
                grid-template-columns: 1fr 1fr; 
                gap: 1.5rem;
            }
            .btn-hunt { grid-column: span 2; }
            #count { grid-column: span 2; }
        }

        /* Mobile (Below 768px) */
        @media (max-width: 767px) {
            .container { padding: 1rem; }
            header { 
                flex-direction: column; 
                gap: 1.5rem; 
                padding: 1.5rem; 
                text-align: center;
            }
            .search-grid { 
                grid-template-columns: 1fr; 
                padding: 1rem;
            }
            .btn-hunt, #count { grid-column: span 1; }
            
            .batch-card { padding: 1.5rem 1rem; }
            .batch-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            
            /* Horizontal Scroll for Table on small screens */
            .table-container { 
                overflow-x: auto; 
                margin: 0 -1rem; 
                padding: 0 1rem;
            }
            .lead-table { min-width: 600px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">LeadsFlow Pro 3.0</div>
            <div style="display:flex; gap: 12px; align-items: center;">
                <span id="userBadge" style="font-size: 0.8rem; font-weight: 600; color: var(--text-dim);">Hunter Console</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="search-grid">
            <input type="text" id="niche" placeholder="Business Niche (e.g. Roofers)">
            <input type="text" id="location" placeholder="City or Country">
            <input type="number" id="count" placeholder="Limit" value="10">
            <button class="btn-hunt" onclick="startHunt()">Engage Engine</button>
        </div>

        <div id="statusPanel" class="status-panel">
            <div class="status-header">
                <span>IMMORTAL TITAN V39.1 ACTIVE</span>
                <span id="huntProgressText">0%</span>
            </div>
            <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 1.25rem; overflow: hidden;">
                <div id="progressBar" style="width: 0%; height: 100%; background: linear-gradient(to right, var(--primary), var(--accent)); transition: 0.5s ease; box-shadow: 0 0 15px var(--primary-glow);"></div>
            </div>
            <div id="logDisplay" class="log-display">> Initializing secure tunnel...</div>
        </div>

        <div id="batchesContainer"></div>
    </div>

    <script>
        async function logout() {
            await fetch('/logout');
            window.location.href = '/login';
        }

        async function startHunt() {
            const niche = document.getElementById('niche').value;
            const location = document.getElementById('location').value;
            const count = document.getElementById('count').value;

            if(!niche || !location) return alert("Please specify Niche and Location");

            document.getElementById('huntProgressText').innerText = "0%";
            document.getElementById('progressBar').style.width = "0%";
            document.getElementById('statusPanel').style.display = 'block';
            document.getElementById('logDisplay').innerText = "> Launching engine...";

            const res = await fetch('/hunt', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({niche, location, count})
            });

            if(res.ok) pollStatus();
            else alert("Engine busy or Error occurred.");
        }

        async function pollStatus() {
            const res = await fetch('/status');
            const status = await res.json();
            
            const pct = status.percent || 0;
            document.getElementById('huntProgressText').innerText = `${pct}%`;
            document.getElementById('progressBar').style.width = `${pct}%`;
            document.getElementById('logDisplay').innerText = `> ${status.progress}`;
            
            if(status.is_running) {
                setTimeout(pollStatus, 1500);
            } else {
                if(status.last_result) {
                    const log = document.getElementById('logDisplay');
                    log.innerText = `> ${status.last_result}`;
                    log.style.color = status.last_result.includes('Success') ? 'var(--accent)' : '#ef4444';
                }
                loadData();
            }
        }

        async function loadData() {
            const res = await fetch('/data');
            const data = await res.json();
            
            const container = document.getElementById('batchesContainer');
            if(data.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 4rem; color: var(--text-dim); font-weight: 500;">No lead batches found. Start a new hunt to begin.</div>';
                return;
            }

            container.innerHTML = data.map(batch => `
                <div class="batch-card">
                    <div class="batch-header">
                        <div class="batch-info">
                            <h3>${batch.niche} in ${batch.location}</h3>
                            <p>${batch.timestamp} • ${batch.leads.length} leads secured</p>
                        </div>
                        <a href="/export/csv" class="btn-download">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Export CSV
                        </a>
                    </div>
                    <div class="table-container">
                    <table class="lead-table">
                        <thead>
                            <tr>
                                <th>Entity Details</th>
                                <th>Contact Access</th>
                                <th>Quality</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${batch.leads.map(l => {
                                const hasEmail = l.Email && l.Email !== 'None';
                                const hasWA = l.Phone && l.Phone.startsWith('W:');
                                const isGolden = l.Score >= 8.5;
                                return `
                                    <tr class="${isGolden ? 'golden-lead' : ''}">
                                        <td>
                                            ${isGolden ? '<div class="golden-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg> Premium SMB</div>' : ''}
                                            <div style="font-weight:700; font-size: 1.05rem;">${l.Name}</div>
                                            <div style="color: var(--text-dim); font-size: 0.75rem; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px;">${l.Website}</div>
                                            <a href="${l.Website}" target="_blank" class="btn-audit">Audit Presence</a>
                                        </td>
                                        <td>
                                            <div style="font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; ${hasEmail ? 'color: var(--primary)' : 'color: var(--text-dim)'}">
                                                ${hasEmail ? l.Email : 'Private Email'}
                                            </div>
                                            <div style="font-size: 0.85rem; font-weight: 600; ${hasWA ? 'color: var(--accent)' : 'color: var(--text-dim)'}">
                                                ${hasWA ? l.Phone.replace('W:','') : 'No Mobile'}
                                            </div>
                                        </td>
                                        <td><span class="score-badge">${l.Score.toFixed(1)}</span></td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                    </div>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
