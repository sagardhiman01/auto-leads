services:
  - type: web
    name: leadsflow-pro-3
    env: python
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "gunicorn --worker-class gthread --threads 4 --workers 1 --timeout 120 -b 0.0.0.0:$PORT api:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: leads-data
      mountPath: /data
      sizeGB: 1
