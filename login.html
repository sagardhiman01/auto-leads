<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LeadsFlow Pro 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #030712; --glass: rgba(255, 255, 255, 0.05); }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030712 100%);
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo { font-size: 2rem; font-weight: 800; margin-bottom: 2rem; background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; color: transparent; }
        input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.5); }
        .footer { margin-top: 2rem; font-size: 0.9rem; color: #9ca3af; }
        .footer a { color: var(--primary); text-decoration: none; }
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">LeadsFlow 3.0</div>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <div class="footer">Don't have an account? <a href="/register">Register</a></div>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('u').value;
            const password = document.getElementById('p').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            if(res.ok) window.location.href = '/';
            else alert("Invalid credentials");
        }
    </script>
</body>
</html>
